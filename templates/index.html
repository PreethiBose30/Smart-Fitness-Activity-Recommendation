<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/history">History</a>
<a href="/analytics">Analytics</a>
<a href="/logout">Logout</a>
</div>

<div class="container">
<div class="card">
  
<h2>Welcome {{ user }}</h2>

<form method="POST">

<input name="steps" placeholder="Steps" required>

</div>
</div>
  
</body>
</html>
