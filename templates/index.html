<!DOCTYPE html>
<html>
<head>
    <title>Smart Fitness App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <span>Smart Fitness Recommendation System</span>
    <button onclick="toggleDark()">🌙</button>
</div>

<!-- CENTER CONTENT -->
<div class="main">
<div class="container">
    <h2>Enter Your Details</h2>

    <form id="form">

        <div class="form-group">
            <label>Age</label>
            <input id="age" required>
        </div>

        <div class="form-group">
            <label>Height (cm)</label>
            <input id="height" required>
        </div>

        <div class="form-group">
            <label>Weight (kg)</label>
            <input id="weight" required>
        </div>

        <div class="form-group">
            <label>Goal</label>
            <select id="goal">
                <option value="maintain">Maintain</option>
                <option value="loss">Weight Loss</option>
                <option value="gain">Weight Gain</option>
            </select>
        </div>

        <div class="form-group">
            <label>Medical Condition</label>
            <select id="medical">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>
        </div>

        <button type="submit">Get Result</button>
    </form>

    <p id="progress"></p>
</div>
</div>

<!-- RESULT MODAL -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <h2>Your Results</h2>

        <p id="bmi"></p>
        <p id="category"></p>
        <p id="calories"></p>
        <p id="water"></p>
        <p id="workout"></p>

        <ul id="activities"></ul>

        <button onclick="showDiet()">Show Diet Plan</button>
        <button onclick="closeResult()">Close</button>
    </div>
</div>

<!-- DIET MODAL -->
<div id="dietModal" class="modal">
    <div class="modal-content">
        <h2>Diet Plan</h2>

        <p id="dietBmi"></p>
        <p id="dietCategory"></p>

        <div class="chart-box">
            <canvas id="chart"></canvas>
        </div>

        <table id="foodTable"></table>

        <button onclick="closeDiet()">Close</button>
    </div>
</div>

<script>
let chartInstance;

// DARK MODE
function toggleDark() {
    document.body.classList.toggle("dark");
}

// FORM SUBMIT
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let age = document.getElementById("age").value;
    let height = document.getElementById("height").value;
    let weight = document.getElementById("weight").value;
    let goal = document.getElementById("goal").value;
    let medical = document.getElementById("medical").value;

    fetch("/calculate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            age: age,
            height: height,
            weight: weight,
            goal: goal,
            medical: medical
        })
    })
    .then(res => res.json())
    .then(data => {

        // Progress
        let lastBMI = localStorage.getItem("bmi");
        if (lastBMI) {
            document.getElementById("progress").innerText =
                "Previous BMI: " + lastBMI + " → Now: " + data.bmi;
        }
        localStorage.setItem("bmi", data.bmi);

        document.getElementById("bmi").innerText = "BMI: " + data.bmi;
        document.getElementById("category").innerText = "Category: " + data.category;
        document.getElementById("calories").innerText = "Calories: " + data.calories;
        document.getElementById("water").innerText = "Water: " + data.water + " L";
        document.getElementById("workout").innerText = "Workout: " + data.workout;

        let list = document.getElementById("activities");
        list.innerHTML = "";
        data.activities.forEach(a => {
            let li = document.createElement("li");
            li.innerText = a;
            list.appendChild(li);
        });

        window.dietData = data;

        document.getElementById("resultModal").style.display = "flex";
    })
    .catch(err => {
        console.log("ERROR:", err);
        alert("Something went wrong. Check console.");
    });
});

// CLOSE RESULT
function closeResult() {
    document.getElementById("resultModal").style.display = "none";
}

// SHOW DIET
function showDiet() {
    closeResult();

    let data = window.dietData;

    document.getElementById("dietBmi").innerText = "BMI: " + data.bmi;
    document.getElementById("dietCategory").innerText = "Category: " + data.category;

    let table = document.getElementById("foodTable");
    table.innerHTML = "<tr><th>Type</th><th>Foods</th></tr>";

    for (let key in data.foods) {
        table.innerHTML += `<tr><td>${key}</td><td>${data.foods[key]}</td></tr>`;
    }

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(document.getElementById("chart"), {
        type: "pie",
        data: {
            labels: data.labels,
            datasets: [{ data: data.chart_data }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    document.getElementById("dietModal").style.display = "flex";
}

// CLOSE DIET
function closeDiet() {
    document.getElementById("dietModal").style.display = "none";
}
</script>

</body>
</html>
