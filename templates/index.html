<!DOCTYPE html>
<html>
<head>
    <title>Fitness App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="header">
    Fitness App
</div>

<div class="main">
<div class="container">
    <h2>Enter Details</h2>

    <form id="form">

        Age:
        <input id="age" required>

        Height (cm):
        <input id="height" required>

        Weight:
        <input id="weight" required>

        Goal:
        <select id="goal">
            <option value="maintain">Maintain</option>
            <option value="loss">Weight Loss</option>
            <option value="gain">Weight Gain</option>
        </select>

        Medical:
        <select id="medical">
            <option value="no">No</option>
            <option value="yes">Yes</option>
        </select>

        <button type="submit">Get Result</button>
    </form>
</div>
</div>

<!-- RESULT POPUP -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <h3 id="bmi"></h3>
        <p id="category"></p>
        <p id="calories"></p>
        <p id="water"></p>
        <p id="workout"></p>

        <ul id="activities"></ul>

        <button onclick="showDiet()">Show Diet</button>
    </div>
</div>

<!-- DIET POPUP -->
<div id="dietModal" class="modal">
    <div class="modal-content">
        <div class="chart-box">
            <canvas id="chart"></canvas>
        </div>
        <table id="foodTable"></table>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    fetch("/calculate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            age: document.getElementById("age").value,
            height: document.getElementById("height").value,
            weight: document.getElementById("weight").value,
            goal: document.getElementById("goal").value,
            medical: document.getElementById("medical").value
        })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("bmi").innerText = "BMI: " + data.bmi;
        document.getElementById("category").innerText = "Category: " + data.category;
        document.getElementById("calories").innerText = "Calories: " + data.calories;
        document.getElementById("water").innerText = "Water: " + data.water;
        document.getElementById("workout").innerText = "Workout: " + data.workout;

        let list = document.getElementById("activities");
        list.innerHTML = "";
        data.activities.forEach(a => {
            list.innerHTML += "<li>" + a + "</li>";
        });

        window.dataStore = data;

        document.getElementById("resultModal").style.display = "flex";
    });
});

});

function showDiet(){
    document.getElementById("resultModal").style.display = "none";

    let data = window.dataStore;

    let table = document.getElementById("foodTable");
    table.innerHTML = "<tr><th>Type</th><th>Foods</th></tr>";

    for(let k in data.foods){
        table.innerHTML += `<tr><td>${k}</td><td>${data.foods[k]}</td></tr>`;
    }

    new Chart(document.getElementById("chart"), {
        type: "pie",
        data: {
            labels: data.labels,
            datasets: [{ data: data.chart_data }]
        },
        options: { maintainAspectRatio: false }
    });

    document.getElementById("dietModal").style.display = "flex";
}
</script>

</body>
</html>
