<!DOCTYPE html>
<html>
<head>
    <title>Fitness Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Welcome {{ user }}</h2>

    <form method="POST">
        <input name="height" placeholder="Height (cm or m)" required>
        <input name="weight" placeholder="Weight (kg)" required>

        <select name="medical_condition">
            <option value="no">No Medical Condition</option>
            <option value="yes">Medical Condition</option>
        </select>

        <select name="food_type">
            <option value="veg">Vegetarian</option>
            <option value="nonveg">Non-Vegetarian</option>
        </select>

        <button type="submit">Get Result</button>
    </form>

    <a href="/history"><button>View History</button></a>
    <a href="/logout"><button>Logout</button></a>
</div>

</body>
</html>
