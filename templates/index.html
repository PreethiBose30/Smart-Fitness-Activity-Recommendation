<!DOCTYPE html>
<html>
<head>
    <title>Fitness App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Fitness App</h2>

    <form id="form">
        <input id="age" placeholder="Age" required>
        <input id="height" placeholder="Height (cm)" required>
        <input id="weight" placeholder="Weight (kg)" required>
        <button type="submit">Get Result</button>
    </form>
</div>

<!-- POPUP -->
<div id="popup" class="modal">
    <div class="modal-content">
        <h3 id="bmi"></h3>
        <p id="category"></p>
        <ul id="activities"></ul>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    document.getElementById("form").addEventListener("submit", function(e){
        e.preventDefault();

        fetch("/calculate", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                age: document.getElementById("age").value,
                height: document.getElementById("height").value,
                weight: document.getElementById("weight").value
            })
        })
        .then(res => res.json())
        .then(data => {

            document.getElementById("bmi").innerText = "BMI: " + data.bmi;
            document.getElementById("category").innerText = "Category: " + data.category;

            let list = document.getElementById("activities");
            list.innerHTML = "";
            data.activities.forEach(a => {
                list.innerHTML += "<li>" + a + "</li>";
            });

            document.getElementById("popup").style.display = "flex";
        })
        .catch(err => {
            alert("Error connecting to backend");
            console.log(err);
        });

    });

});
</script>

</body>
</html>
