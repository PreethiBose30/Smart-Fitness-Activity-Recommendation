<!DOCTYPE html>
<html>
<head>
    <title>Fitness App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/diet">Diet</a>
    <a href="/about">About</a>
</div>

<div class="container">
    <h2>Fitness Recommendation</h2>

    <form method="POST">
        <label>Age</label>
        <input name="age" value="{{ age }}">

        <label>Height (m or cm)</label>
        <input name="height" value="{{ height }}">

        <label>Weight (kg)</label>
        <input name="weight" value="{{ weight }}">

        <label>Activity</label>
        <select name="activity_level">
            <option value="beginner" {% if activity=="beginner" %}selected{% endif %}>Beginner</option>
            <option value="active" {% if activity=="active" %}selected{% endif %}>Active</option>
        </select>

        <label>Medical Condition</label>
        <select name="medical_condition">
            <option value="no" {% if medical=="no" %}selected{% endif %}>No</option>
            <option value="yes" {% if medical=="yes" %}selected{% endif %}>Yes</option>
        </select>

        <button type="submit">Get Recommendation</button>
    </form>

    {% if bmi is not none %}
    <div class="result">
        <h3>BMI: {{ bmi }}</h3>
        <h4>Category: {{ category }}</h4>

        <h4>Recommended Activities:</h4>
        <ul>
            {% for r in recommendations %}
            <li>{{ r }}</li>
            {% endfor %}
        </ul>

        <h4>Notes:</h4>
        <ul>
            {% for n in notes %}
            <li>{{ n }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

</body>
</html>
