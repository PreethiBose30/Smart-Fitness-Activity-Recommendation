<!DOCTYPE html>
<html>
<head>
    <title>Fitness App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="header">Fitness App</div>

<div class="main">
<div class="container">
    <h2>Enter Details</h2>

    <form id="form">

        Age:
        <input id="age" required>

        Height (cm):
        <input id="height" required>

        Weight:
        <input id="weight" required>

        Goal:
        <select id="goal">
            <option value="maintain">Maintain</option>
            <option value="loss">Weight Loss</option>
            <option value="gain">Weight Gain</option>
        </select>

        Medical:
        <select id="medical">
            <option value="no">No</option>
            <option value="yes">Yes</option>
        </select>

        <button type="submit">Get Result</button>
    </form>
</div>
</div>

<!-- RESULT -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <h3 id="bmi"></h3>
        <p id="category"></p>
        <ul id="activities"></ul>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    console.log("JS LOADED");   // 🔥 MUST SHOW IN CONSOLE

    const form = document.getElementById("form");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        console.log("BUTTON CLICKED");  // 🔥 MUST SHOW

        fetch("/calculate", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                age: document.getElementById("age").value,
                height: document.getElementById("height").value,
                weight: document.getElementById("weight").value,
                goal: document.getElementById("goal").value,
                medical: document.getElementById("medical").value
            })
        })
        .then(res => res.json())
        .then(data => {

            document.getElementById("bmi").innerText = "BMI: " + data.bmi;
            document.getElementById("category").innerText = data.category;

            let list = document.getElementById("activities");
            list.innerHTML = "";
            data.activities.forEach(a => {
                list.innerHTML += "<li>" + a + "</li>";
            });

            document.getElementById("resultModal").style.display = "flex";
        })
        .catch(err => {
            console.log("ERROR:", err);
            alert("Backend not responding");
        });

    });

});
</script>

</body>
</html>
