<!DOCTYPE html>
<html>
<head>
    <title>Fitness App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/diet">Diet</a>
    <a href="/about">About</a>
</div>

<div class="container">
    <h2>Fitness Recommendation</h2>

    <form method="POST">
        <input name="age" placeholder="Age" value="{{ age }}">
        <input name="height" placeholder="Height (cm or m)" value="{{ height }}">
        <input name="weight" placeholder="Weight (kg)" value="{{ weight }}">

        <select name="activity_level">
            <option value="beginner" {% if activity=="beginner" %}selected{% endif %}>Beginner</option>
            <option value="active" {% if activity=="active" %}selected{% endif %}>Active</option>
        </select>

        <select name="medical_condition">
            <option value="no" {% if medical=="no" %}selected{% endif %}>No medical issues</option>
            <option value="yes" {% if medical=="yes" %}selected{% endif %}>Have condition</option>
        </select>

        <button type="submit">Get Recommendation</button>
    </form>

    {% if bmi is not none %}
    <div class="result">
        <h3>BMI: {{ bmi }}</h3>
        <h4>{{ category }}</h4>

        <ul>
            {% for r in recommendations %}
            <li>{{ r }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

</body>
</html>
