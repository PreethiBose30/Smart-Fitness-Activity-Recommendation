<!DOCTYPE html>
<html>
<head>
    <title>Fitness App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="header">
    <span>Fitness App</span>
</div>

<div class="main">
<div class="container">
    <h2>Enter Details</h2>

    <form id="form">

        <div class="form-group">
            <label>Age</label>
            <input id="age" required>
        </div>

        <div class="form-group">
            <label>Height (cm)</label>
            <input id="height" required>
        </div>

        <div class="form-group">
            <label>Weight (kg)</label>
            <input id="weight" required>
        </div>

        <div class="form-group">
            <label>Goal</label>
            <select id="goal">
                <option value="maintain">Maintain</option>
                <option value="loss">Weight Loss</option>
                <option value="gain">Weight Gain</option>
            </select>
        </div>

        <div class="form-group">
            <label>Medical</label>
            <select id="medical">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>
        </div>

        <button type="submit">Get Result</button>
    </form>
</div>
</div>

<!-- RESULT -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <h3 id="bmi"></h3>
        <p id="category"></p>
        <p id="calories"></p>
        <p id="water"></p>
        <p id="workout"></p>

        <ul id="activities"></ul>

        <button onclick="showDiet()">Show Diet</button>
    </div>
</div>

<!-- DIET -->
<div id="dietModal" class="modal">
    <div class="modal-content">
        <div class="chart-box">
            <canvas id="chart"></canvas>
        </div>
        <table id="foodTable"></table>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    fetch("/calculate", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            age:age.value,
            height:height.value,
            weight:weight.value,
            goal:goal.value,
            medical:medical.value
        })
    })
    .then(res=>res.json())
    .then(data=>{

        bmi.innerText = "BMI: "+data.bmi;
        category.innerText = "Category: "+data.category;
        calories.innerText = "Calories: "+data.calories;
        water.innerText = "Water: "+data.water;
        workout.innerText = "Workout: "+data.workout;

        activities.innerHTML="";
        data.activities.forEach(a=>{
            activities.innerHTML += "<li>"+a+"</li>";
        });

        window.dataStore = data;

        resultModal.style.display="flex";
    });

});

});

function showDiet(){
    resultModal.style.display="none";

    let data = window.dataStore;

    foodTable.innerHTML="<tr><th>Type</th><th>Foods</th></tr>";

    for(let k in data.foods){
        foodTable.innerHTML+=`<tr><td>${k}</td><td>${data.foods[k]}</td></tr>`;
    }

    new Chart(chart,{
        type:"pie",
        data:{
            labels:data.labels,
            datasets:[{data:data.chart_data}]
        },
        options:{maintainAspectRatio:false}
    });

    dietModal.style.display="flex";
}
</script>

</body>
</html>
