<!DOCTYPE html>
<html>
<head>
    <title>Diet Chart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/diet">Diet</a>
    <a href="/about">About</a>
</div>

<div class="container">
    <h2>Balanced Diet Chart</h2>

    <canvas id="chart"></canvas>

    <table>
        <tr>
            <th>Category</th>
            <th>Foods</th>
        </tr>
        <tr>
            <td>Proteins</td>
            <td>Eggs, Chicken, Paneer, Lentils</td>
        </tr>
        <tr>
            <td>Carbs</td>
            <td>Rice, Bread, Fruits</td>
        </tr>
        <tr>
            <td>Fats</td>
            <td>Nuts, Oils, Butter</td>
        </tr>
    </table>
</div>

<script>
new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
        labels: ["Proteins", "Carbs", "Fats"],
        datasets: [{
            data: [30, 50, 20]
        }]
    }
});
</script>

</body>
</html>
