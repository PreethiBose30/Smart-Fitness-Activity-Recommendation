<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="sidebar">
    <h2>FitTrack</h2>
    <a href="/">Home</a>
    <a href="/history">History</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

<div class="card">

<h2>Result</h2>

<div class="info">
<p><b>BMI:</b> {{ bmi }}</p>
<p><b>Category:</b> {{ category }}</p>
<p><b>Calories:</b> {{ calories }}</p>
</div>

<h3>Recommended Activities</h3>
<ul>
{% for a in activities %}
<li>{{ a }}</li>
{% endfor %}
</ul>

<a href="/diet?bmi={{ bmi }}&category={{ category }}&food_type={{ food_type }}">
<button>View Diet</button>
</a>

</div>

</div>

</body>
</html>
