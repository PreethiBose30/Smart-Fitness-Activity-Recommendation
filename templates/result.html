<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="sidebar">
<h2>Fitness App</h2>
<a href="/">🏠 Home</a>
<a href="/history">📊 History</a>
<a href="/logout">🚪 Logout</a>
</div>

<div class="main">
<div class="container">

<h2>Results</h2>

<p>BMI: {{ bmi }}</p>
<p>Category: {{ category }}</p>
<p>Calories: {{ calories }}</p>

<ul>
{% for a in activities %}
<li>{{ a }}</li>
{% endfor %}
</ul>

<a href="/diet?bmi={{ bmi }}&category={{ category }}&food_type={{ food_type }}">
<button>Diet Plan</button>
</a>

</div>
</div>

</body>
</html>
