<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/history">History</a>
<a href="/analytics">Analytics</a>
<a href="/logout">Logout</a>
</div>

<div class="container">
<div class="card">
  
<h2>Your Results</h2>

<p><b>BMI:</b> {{ bmi }}</p>
<p><b>Category:</b> {{ category }}</p>
<p><b>Suggested Goal:</b> {{ goal }}</p>
<p><b>Calories:</b> {{ calories }}</p>

<ul>
{% for a in activities %}
<li>{{ a }}</li>
{% endfor %}
</ul>

<a href="/diet?category={{ category }}&bmi={{ bmi }}">
<button>Smart Diet Plan</button>
</a>

</div>
</body>
</html>
