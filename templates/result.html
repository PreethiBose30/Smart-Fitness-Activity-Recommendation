<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Your Results</h2>

    <h3>BMI: {{ bmi }}</h3>
    <h4>Category: {{ category }}</h4>
    <h4>Daily Calories Needed: {{ calories }} kcal</h4>

    <!-- Progress Bar -->
    <div style="background:#ddd; border-radius:10px;">
        <div style="width: {{ bmi*2 }}%; background:green; padding:10px; color:white;">
            BMI Level
        </div>
    </div>

    <h4>Recommended Activities:</h4>
    <ul>
        {% for a in activities %}
        <li>{{ a }}</li>
        {% endfor %}
    </ul>

    <h4>Notes:</h4>
    <ul>
        {% for n in notes %}
        <li>{{ n }}</li>
        {% endfor %}
    </ul>

    <a href="/diet?bmi={{ bmi }}&category={{ category }}&food_type={{ food_type }}">
        <button>Show Diet Plan</button>
    </a>

    <a href="/">
        <button>Home</button>
    </a>
</div>

</body>
</html>
