<div class="container">
<div class="card">

<h2>Results</h2>

<p>BMI: {{ bmi }}</p>
<p>Category: {{ category }}</p>
<p>Goal: {{ goal }}</p>
<p>Calories: {{ calories }}</p>

<ul>
{% for a in activities %}
<li>{{ a }}</li>
{% endfor %}
</ul>

<a href="/diet?category={{ category }}&bmi={{ bmi }}">
<button>Diet Plan</button>
</a>

</div>
</div>
