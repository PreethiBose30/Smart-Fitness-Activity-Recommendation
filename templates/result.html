<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Your Results</h2>

    <h3>BMI: {{ bmi }}</h3>
    <h4>Category: {{ category }}</h4>

    <h4>Recommended Activities:</h4>
    <ul>
        {% for a in activities %}
        <li>{{ a }}</li>
        {% endfor %}
    </ul>

    <h4>Notes:</h4>
    <ul>
        {% for n in notes %}
        <li>{{ n }}</li>
        {% endfor %}
    </ul>

    <a href="/diet?bmi={{ bmi }}&category={{ category }}">
        <button>Show Diet Plan</button>
    </a>
</div>

</body>
</html>
